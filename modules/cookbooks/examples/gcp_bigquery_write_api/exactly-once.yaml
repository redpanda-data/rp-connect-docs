# tag::config[]
input:
  kafka_franz:
    seed_brokers: ["${REDPANDA_BROKERS}"]
    topics: ["${SOURCE_TOPIC}"]
    consumer_group: bigquery_sink

pipeline:
  processors:
    # Project only the columns the table expects and convert the integer id to
    # a string for BigQuery's proto3 JSON mapping.
    - mapping: |
        root.id = this.id.string()
        root.event = this.event

output:
  gcp_bigquery_write_api:
    project: ${GCP_PROJECT}
    dataset: ${BQ_DATASET}
    table: ${BQ_TABLE}
    message_format: json
    write_mode: pending_stream
    batching:
      count: 5000
      period: 10s
# end::config[]

# tag::tests[]
tests:
  - name: Project columns and stringify id
    target_processors: '/pipeline/processors/0'
    input_batch:
      - json_content:
          id: 7
          event: "purchase"
          internal_only: "drop-me"
    output_batches:
      - - json_contains:
            id: "7"
            event: "purchase"
# end::tests[]
