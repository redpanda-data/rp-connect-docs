# tag::config[]
input:
  gcp_spanner_cdc:
    project_id: ${GCP_PROJECT_ID}
    instance_id: ${GCP_INSTANCE_ID}
    database_id: ${GCP_DATABASE_ID}
    stream_id: ${GCP_STREAM_ID}

output:
  broker:
    pattern: fan_out
    outputs:
      - kafka_franz:
          seed_brokers:
            - ${REDPANDA_BROKERS}
          topic: spanner.inserts
          processors:
            - mapping: |
                root = if this.mod_type != "INSERT" { deleted() }
      - kafka_franz:
          seed_brokers:
            - ${REDPANDA_BROKERS}
          topic: spanner.changes
          processors:
            - mapping: |
                root = if this.mod_type == "INSERT" { deleted() }
# end::config[]
