# tag::config[]
input:
  mongodb_cdc:
    url: ${MONGODB_URL}
    database: ${MONGODB_DB}
    collections:
      - orders
    checkpoint_cache: redis_cache
    stream_snapshot: false

output:
  switch:
    cases:
      - check: meta("operation") == "create"
        output:
          kafka_franz:
            seed_brokers:
              - ${REDPANDA_BROKERS}
            topic: mongodb.orders.inserts
      - output:
          kafka_franz:
            seed_brokers:
              - ${REDPANDA_BROKERS}
            topic: mongodb.orders.changes

cache_resources:
  - label: redis_cache
    redis:
      url: ${REDIS_URL}
# end::config[]
