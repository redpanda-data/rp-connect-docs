# tag::config[]
input:
  mysql_cdc:
    dsn: ${MYSQL_DSN}
    tables:
      - mydb.orders
    checkpoint_cache: redis_cache
    stream_snapshot: true

output:
  broker:
    pattern: fan_out
    outputs:
      - kafka_franz:
          seed_brokers:
            - ${REDPANDA_BROKERS}
          topic: mysql.orders.inserts
          processors:
            - mapping: |
                root = if meta("operation") != "insert" { deleted() }
      - kafka_franz:
          seed_brokers:
            - ${REDPANDA_BROKERS}
          topic: mysql.orders.changes
          processors:
            - mapping: |
                root = if meta("operation") == "insert" { deleted() }

cache_resources:
  - label: redis_cache
    redis:
      url: ${REDIS_URL}
# end::config[]
