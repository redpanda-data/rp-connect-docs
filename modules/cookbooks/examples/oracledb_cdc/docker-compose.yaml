version: '3.8'

services:
  # Oracle Database XE for CDC input testing
  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: oracle-cdc-test
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: TestPassword123
      APP_USER: cdc_user
      APP_USER_PASSWORD: CdcPassword123
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redpanda for Kafka output testing
  redpanda:
    image: redpandadata/redpanda:v24.3.1
    container_name: redpanda-cdc-test
    ports:
      - "9092:9092"
      - "8081:8081"
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LocalStack for S3 output testing
  localstack:
    image: localstack/localstack:3.8
    container_name: localstack-cdc-test
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=0
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  oracle-data:
  redpanda-data:
  localstack-data:
