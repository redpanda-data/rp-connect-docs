# tag::config[]
input:
  oracledb_cdc:
    connection_string: ${ORACLE_CONNECTION_STRING}
    include:
      - "MY_SCHEMA\\.ORDERS"

pipeline:
  processors:
    # Filter out delete events
    - mapping: |
        root = if meta("operation") == "delete" { deleted() } else { this }

    # Add operation metadata to the message
    - mapping: |
        root = this.merge({
          "operation": meta("operation"),
          "table": meta("table_name")
        })

output:
  stdout:
    codec: lines
# end::config[]

# tag::tests[]
tests:
  - name: Pass INSERT event
    target_processors: '/pipeline/processors'
    environment:
      ORACLE_CONNECTION_STRING: oracle://test:test@localhost:1521/test
    input_batch:
      - content: |
          {"id": 123, "status": "pending"}
        metadata:
          operation: insert
          table_name: ORDERS
          database_schema: MY_SCHEMA
          scn: "1234567"
    output_batches:
      - - json_contains:
            id: 123
            operation: insert
            table: ORDERS

  - name: Pass UPDATE event
    target_processors: '/pipeline/processors'
    environment:
      ORACLE_CONNECTION_STRING: oracle://test:test@localhost:1521/test
    input_batch:
      - content: |
          {"id": 123, "status": "shipped"}
        metadata:
          operation: update
          table_name: ORDERS
          database_schema: MY_SCHEMA
          scn: "1234568"
    output_batches:
      - - json_contains:
            id: 123
            operation: update
            table: ORDERS

  - name: Filter DELETE event
    target_processors: '/pipeline/processors'
    environment:
      ORACLE_CONNECTION_STRING: oracle://test:test@localhost:1521/test
    input_batch:
      - content: |
          {"id": 456}
        metadata:
          operation: delete
          table_name: ORDERS
          database_schema: MY_SCHEMA
          scn: "1234569"
    output_batches: [] # DELETE event is filtered out

  - name: Pass READ event (snapshot)
    target_processors: '/pipeline/processors'
    environment:
      ORACLE_CONNECTION_STRING: oracle://test:test@localhost:1521/test
    input_batch:
      - content: |
          {"id": 789, "status": "completed"}
        metadata:
          operation: read
          table_name: ORDERS
          database_schema: MY_SCHEMA
          scn: "1234560"
    output_batches:
      - - json_contains:
            id: 789
            operation: read
            table: ORDERS
# end::tests[]
